<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(59,130,246,0.1)" stroke-width="0.5"/>
  </pattern>
  <rect width="400" height="400" fill="url(#grid)"/>
  
  <!-- Heart with strong arms -->
  <g transform="translate(200, 180)">
    <!-- Strong defined left arm -->
    <path d="M -60 -20 Q -90 -30 -100 10 Q -110 50 -90 80 Q -80 90 -70 70 Q -60 50 -50 30 Q -45 20 -50 0" 
          fill="url(#armGrad)" stroke="#1e40af" stroke-width="2"/>
    <!-- Strong defined right arm -->
    <path d="M 60 -20 Q 90 -30 100 10 Q 110 50 90 80 Q 80 90 70 70 Q 60 50 50 30 Q 45 20 50 0" 
          fill="url(#armGrad)" stroke="#1e40af" stroke-width="2"/>
    
    <!-- Heart body -->
    <path d="M 0 60 
             C -60 -20 -120 -20 -120 40 
             C -120 90 -60 130 0 170 
             C 60 130 120 90 120 40 
             C 120 -20 60 -20 0 60 Z" 
          fill="url(#heartGrad)" stroke="#b91c1c" stroke-width="3"/>
    
    <!-- Heart shine -->
    <ellipse cx="-40" cy="30" rx="20" ry="15" fill="rgba(255,255,255,0.3)"/>
    
    <!-- Face on heart -->
    <circle cx="-20" cy="50" r="8" fill="white"/>
    <circle cx="20" cy="50" r="8" fill="white"/>
    <circle cx="-20" cy="52" r="3" fill="#1e293b"/>
    <circle cx="20" cy="52" r="3" fill="#1e293b"/>
    <!-- Smile -->
    <path d="M -15 70 Q 0 85 15 70" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Plate/food icon floating -->
  <g transform="translate(320, 100)">
    <circle cx="0" cy="0" r="35" fill="white" opacity="0.2"/>
    <circle cx="0" cy="0" r="25" fill="#22c55e"/>
    <!-- Food items on plate -->
    <circle cx="-8" cy="-5" r="6" fill="#16a34a"/>
    <circle cx="8" cy="-5" r="6" fill="#f97316"/>
    <circle cx="0" cy="8" r="5" fill="#ef4444"/>
  </g>
  
  <!-- AI processing lines -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.6">
    <line x1="280" y1="150" x2="220" y2="170">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="290" y1="180" x2="230" y2="190">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </line>
    <line x1="295" y1="210" x2="235" y2="210">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </line>
  </g>
  
  <!-- Nutritional info floating -->
  <g transform="translate(80, 280)">
    <rect x="0" y="0" width="120" height="60" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
    <text x="60" y="25" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="14" font-weight="bold">325 kcal</text>
    <text x="60" y="45" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="11">Proteínas: 12g</text>
  </g>
  
  <!-- Text -->
  <text x="200" y="360" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="22" font-weight="bold">ChatNutri</text>
  <text x="200" y="382" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="12">IA Nutricional</text>
</svg>