<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff"/>
      <stop offset="100%" style="stop-color:#7A288A"/>
    </linearGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,242,255,0.1)" stroke-width="0.5"/>
  </pattern>
  <rect width="400" height="400" fill="url(#grid)"/>
  
  <!-- Robot Head -->
  <g transform="translate(120, 80)">
    <!-- Main head -->
    <rect x="0" y="20" width="160" height="140" rx="30" fill="url(#robotGrad)" opacity="0.9"/>
    <!-- Face plate -->
    <rect x="20" y="40" width="120" height="90" rx="20" fill="#0a0a0f"/>
    <!-- Eyes -->
    <circle cx="50" cy="75" r="18" fill="#00f2ff">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="110" cy="75" r="18" fill="#00f2ff">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Eye shine -->
    <circle cx="45" cy="70" r="5" fill="white" opacity="0.8"/>
    <circle cx="105" cy="70" r="5" fill="white" opacity="0.8"/>
    <!-- Mouth -->
    <rect x="55" y="105" width="50" height="8" rx="4" fill="#00f2ff" opacity="0.7"/>
    <!-- Antenna -->
    <rect x="75" y="0" width="10" height="25" fill="#00f2ff"/>
    <circle cx="80" cy="0" r="8" fill="#ff006e">
      <animate attributeName="r" values="8;10;8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Thought bubble -->
  <g transform="translate(250, 60)">
    <ellipse cx="50" cy="50" rx="45" ry="35" fill="white" opacity="0.15"/>
    <circle cx="20" cy="95" r="8" fill="white" opacity="0.15"/>
    <circle cx="10" cy="110" r="5" fill="white" opacity="0.1"/>
  </g>
  
  <!-- Food Plate -->
  <g transform="translate(280, 140)">
    <!-- Plate -->
    <circle cx="50" cy="50" r="45" fill="white" opacity="0.2"/>
    <circle cx="50" cy="50" r="35" fill="url(#plateGrad)" opacity="0.8"/>
    <!-- Food items -->
    <!-- Broccoli -->
    <circle cx="35" cy="40" r="10" fill="#16a34a"/>
    <circle cx="40" cy="35" r="6" fill="#22c55e"/>
    <!-- Carrot -->
    <rect x="55" y="30" width="20" height="8" rx="4" fill="#f97316" transform="rotate(30 65 34)"/>
    <!-- Tomato -->
    <circle cx="45" cy="60" r="8" fill="#ef4444"/>
    <!-- Leaf -->
    <ellipse cx="65" cy="55" rx="8" ry="4" fill="#84cc16" transform="rotate(-20 65 55)"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="350" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">ChatNutri</text>
  <text x="200" y="375" text-anchor="middle" fill="#00f2ff" font-family="Arial, sans-serif" font-size="14">Assistente Nutricional IA</text>
</svg>