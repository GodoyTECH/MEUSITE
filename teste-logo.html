<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Logo - Godoy Solutions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0f;
      --bg-card: rgba(20, 20, 30, 0.8);
      --gradient-neon: linear-gradient(135deg, #00f2ff 0%, #00ff88 100%);
      --border-neon: 1px solid rgba(0, 242, 255, 0.3);
      --shadow-neon: 0 0 20px rgba(0, 242, 255, 0.2);
      --radius-sm: 6px;
      --radius-md: 12px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border-right: var(--border-neon);
      display: flex;
      flex-direction: column;
      padding: 15px;
      min-height: 100vh;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(0, 242, 255, 0.1);
      padding-bottom: 20px;
    }

    .logo-img {
      width: 45px;
      height: 45px;
      object-fit: contain;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      background: var(--gradient-neon);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
      white-space: normal;
      word-break: break-word;
    }

    /* Nav Items */
    .nav-menu { display: flex; flex-direction: column; gap: 5px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 15px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: all 0.3s ease;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(0, 242, 255, 0.1);
      color: #00f2ff;
    }

    /* RESPONSIVO */
    @media (max-width: 480px) {
      .sidebar {
        width: 180px;
        padding: 10px;
      }
      .logo-img {
        width: 35px;
        height: 35px;
      }
      .logo-text {
        font-size: 9px;
      }
      .logo-area {
        gap: 6px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="logo-area">
      <img src="assets/images/logo.png" alt="Godoy Solutions" class="logo-img">
      <span class="logo-text">Godoy Solutions<br>in TECH</span>
    </div>
    <div class="nav-menu">
      <a href="#" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
      <a href="#" class="nav-item"><i class="fas fa-user"></i><span>Sobre</span></a>
      <a href="#" class="nav-item"><i class="fas fa-newspaper"></i><span>Notícias</span></a>
      <a href="#" class="nav-item"><i class="fas fa-envelope"></i><span>Contato</span></a>
    </div>
  </nav>
</body>
</html>
